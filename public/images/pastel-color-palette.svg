<svg xmlns="http://www.w3.org/2000/svg" width="960" height="540" viewBox="0 0 960 540" role="img" aria-labelledby="title desc">
  <title id="title">Pastel Color Palette</title>
  <desc id="desc">A pastel color palette with soft swatches for wedding motif inspiration.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#fff8f2"/>
      <stop offset="100%" stop-color="#f3f4ff"/>
    </linearGradient>
  </defs>
  <rect width="960" height="540" fill="url(#bg)"/>
  <g transform="translate(70 110)">
    <rect x="0" y="0" width="180" height="220" rx="22" fill="#f9d5e5"/>
    <rect x="200" y="0" width="180" height="220" rx="22" fill="#d8f3dc"/>
    <rect x="400" y="0" width="180" height="220" rx="22" fill="#cde7ff"/>
    <rect x="600" y="0" width="180" height="220" rx="22" fill="#fff2b2"/>
  </g>
  <g fill="#5d5662" font-family="Georgia, serif" font-size="28" text-anchor="middle">
    <text x="160" y="370">Blush Pink</text>
    <text x="360" y="370">Mint</text>
    <text x="560" y="370">Powder Blue</text>
    <text x="760" y="370">Soft Yellow</text>
  </g>
  <text x="480" y="445" fill="#6a5f68" font-family="Georgia, serif" font-size="34" text-anchor="middle">
    Pastel Wedding Motif
  </text>
</svg>
